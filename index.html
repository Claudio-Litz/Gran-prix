<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TMPM — Roteamento Dinâmico</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Barlow+Condensed:wght@400;600;700&display=swap');

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0f14;
      --panel-bg: rgba(8, 16, 24, 0.92);
      --border: #1a3a52;
      --accent: #00c8ff;
      --accent2: #00ff9d;
      --danger: #ff3d57;
      --text: #cde8f5;
      --muted: #5a8099;
      --edge-free: #3388ff;
      --edge-blocked: #ff3d57;
      --route: #00ff9d;
      --mono: 'Share Tech Mono', monospace;
      --sans: 'Barlow Condensed', sans-serif;
    }

    html, body { height: 100%; width: 100%; overflow: hidden; background: var(--bg); }

    #map {
      position: absolute;
      inset: 0;
      z-index: 0;
      filter: saturate(0.7) brightness(0.85);
    }

    /* ── PANEL ── */
    #panel {
      position: absolute;
      top: 18px;
      left: 18px;
      z-index: 999;
      width: 290px;
      background: var(--panel-bg);
      border: 1px solid var(--border);
      border-radius: 4px;
      backdrop-filter: blur(12px);
      overflow: hidden;
      box-shadow: 0 8px 40px rgba(0,0,0,0.6), 0 0 0 1px rgba(0,200,255,0.08);
    }

    #panel-header {
      padding: 14px 16px 10px;
      border-bottom: 1px solid var(--border);
      background: rgba(0,200,255,0.04);
    }

    #panel-header .label {
      font-family: var(--mono);
      font-size: 10px;
      letter-spacing: 0.18em;
      color: var(--accent);
      text-transform: uppercase;
      margin-bottom: 2px;
    }

    #panel-header h1 {
      font-family: var(--sans);
      font-size: 18px;
      font-weight: 700;
      letter-spacing: 0.04em;
      color: var(--text);
      text-transform: uppercase;
    }

    #panel-body { padding: 14px 16px; display: flex; flex-direction: column; gap: 10px; }

    .field label {
      display: block;
      font-family: var(--mono);
      font-size: 10px;
      letter-spacing: 0.14em;
      color: var(--muted);
      text-transform: uppercase;
      margin-bottom: 5px;
    }

    .field select {
      width: 100%;
      background: rgba(0,200,255,0.05);
      border: 1px solid var(--border);
      border-radius: 3px;
      color: var(--text);
      font-family: var(--sans);
      font-size: 14px;
      font-weight: 600;
      letter-spacing: 0.03em;
      padding: 7px 10px;
      appearance: none;
      -webkit-appearance: none;
      cursor: pointer;
      transition: border-color 0.2s, background 0.2s;
      outline: none;
    }

    .field select:focus {
      border-color: var(--accent);
      background: rgba(0,200,255,0.09);
    }

    .field select option { background: #0d1e2e; color: var(--text); }

    #divider {
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--border), transparent);
      margin: 0 -16px;
    }

    #status-bar {
      font-family: var(--mono);
      font-size: 11px;
      color: var(--muted);
      letter-spacing: 0.06em;
      min-height: 18px;
      transition: color 0.3s;
      padding-top: 2px;
    }

    #status-bar.ok   { color: var(--accent2); }
    #status-bar.err  { color: var(--danger); }
    #status-bar.idle { color: var(--muted); }

    /* ── CLEAR BUTTON ── */
    #btn-clear {
      width: 100%;
      background: rgba(255, 61, 87, 0.08);
      border: 1px solid rgba(255, 61, 87, 0.35);
      border-radius: 3px;
      color: var(--danger);
      font-family: var(--mono);
      font-size: 10px;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      padding: 8px 10px;
      cursor: pointer;
      transition: background 0.2s, border-color 0.2s;
      outline: none;
    }

    #btn-clear:hover {
      background: rgba(255, 61, 87, 0.18);
      border-color: var(--danger);
    }

    /* ── LEGEND ── */
    #legend {
      position: absolute;
      bottom: 28px;
      left: 18px;
      z-index: 999;
      background: var(--panel-bg);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 10px 14px;
      backdrop-filter: blur(10px);
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .leg-item {
      display: flex;
      align-items: center;
      gap: 8px;
      font-family: var(--mono);
      font-size: 10px;
      letter-spacing: 0.1em;
      color: var(--muted);
      text-transform: uppercase;
    }

    .leg-line {
      width: 28px;
      height: 3px;
      border-radius: 2px;
      flex-shrink: 0;
    }

    .leg-circle {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: #111;
      border: 2px solid #555;
      flex-shrink: 0;
    }

    /* ── TOOLTIP OVERRIDE ── */
    .leaflet-tooltip {
      background: var(--panel-bg) !important;
      border: 1px solid var(--border) !important;
      color: var(--accent) !important;
      font-family: var(--mono) !important;
      font-size: 11px !important;
      letter-spacing: 0.1em !important;
      border-radius: 3px !important;
      box-shadow: 0 4px 16px rgba(0,0,0,0.5) !important;
      padding: 4px 8px !important;
      white-space: nowrap !important;
    }

    .leaflet-tooltip::before { display: none !important; }

    /* ── ATTRIBUTION ── */
    .leaflet-control-attribution { font-size: 9px; opacity: 0.4; }

    /* ── SCAN LINE OVERLAY ── */
    #overlay {
      position: absolute;
      inset: 0;
      z-index: 1;
      pointer-events: none;
      background: repeating-linear-gradient(
        0deg,
        transparent,
        transparent 2px,
        rgba(0, 200, 255, 0.012) 2px,
        rgba(0, 200, 255, 0.012) 4px
      );
    }

    /* ── PULSE NODE ── */
    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50%       { opacity: 0.6; transform: scale(1.3); }
    }

    .node-marker-inner {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: var(--accent);
      border: 2px solid rgba(0,200,255,0.5);
      box-shadow: 0 0 8px var(--accent);
      animation: pulse 2.6s ease-in-out infinite;
    }
  </style>
</head>
<body>
  <div id="map"></div>
  <div id="overlay"></div>

  <div id="panel">
    <div id="panel-header">
      <div class="label">Terminal Marítimo · TMPM</div>
      <h1>Roteamento A*</h1>
    </div>
    <div id="panel-body">
      <div class="field">
        <label>Partida</label>
        <select id="sel-origin"></select>
      </div>
      <div class="field">
        <label>Chegada</label>
        <select id="sel-dest"></select>
      </div>
      <div id="divider"></div>
      <div id="status-bar" class="idle">AGUARDANDO SELEÇÃO…</div>
      <button id="btn-clear">⊗ Limpar Bloqueios</button>
    </div>
  </div>

  <div id="legend">
    <div class="leg-item"><div class="leg-line" style="background:#3388ff"></div>Via livre</div>
    <div class="leg-item"><div class="leg-line" style="background:#ff3d57"></div>Via bloqueada</div>
    <div class="leg-item"><div class="leg-line" style="background:#00ff9d"></div>Rota calculada</div>
    <div class="leg-item"><div class="leg-circle"></div>Interdição (clique)</div>
  </div>

  <script>
  /* ══════════════════════════════════════════════════════════════════
     1. GRAFO GEOGRÁFICO — TMPM, São Luís / MA
     Nós posicionados nos cruzamentos/pontos-chave do terminal.
     Arestas com waypoints intermediários para seguir as vias reais.
  ══════════════════════════════════════════════════════════════════ */

  const nodes = [
    { id: 0, name: 'Portaria Principal',  lat: -2.5628, lng: -44.3812 },
    { id: 1, name: 'Pátio de Triagem',    lat: -2.5635, lng: -44.3778 },
    { id: 2, name: 'Acesso Píer I',       lat: -2.5618, lng: -44.3748 },
    { id: 3, name: 'Cais / Píer I',       lat: -2.5600, lng: -44.3730 },
    { id: 4, name: 'Bifurcação Central',  lat: -2.5648, lng: -44.3748 },
    { id: 5, name: 'Acesso Píer III',     lat: -2.5658, lng: -44.3718 },
    { id: 6, name: 'Cais / Píer III',     lat: -2.5645, lng: -44.3695 },
    { id: 7, name: 'Acesso Píer IV',      lat: -2.5672, lng: -44.3710 },
    { id: 8, name: 'Cais / Píer IV',      lat: -2.5668, lng: -44.3685 },
    { id: 9, name: 'Pátio de Silos',      lat: -2.5660, lng: -44.3660 },
  ];

  /*
   * Cada aresta possui um array `waypoints` com coordenadas intermediárias
   * que fazem a polyline seguir as vias reais do TMPM em vez de cortar em
   * linha reta por edificações ou pelo mar.
   * Os nós source/target são automaticamente incluídos como primeiro e último
   * ponto — waypoints contém apenas os pontos do meio.
   */
  const edges = [
    {
      // Portaria → Pátio de Triagem  (via principal de entrada, curva N→L)
      id: 0, source: 0, target: 1,
      waypoints: [
        { lat: -2.5629, lng: -44.3803 },
        { lat: -2.5631, lng: -44.3790 },
      ],
    },
    {
      // Pátio de Triagem → Bifurcação Central  (eixo viário interno)
      id: 1, source: 1, target: 4,
      waypoints: [
        { lat: -2.5638, lng: -44.3768 },
        { lat: -2.5643, lng: -44.3758 },
      ],
    },
    {
      // Bifurcação Central → Acesso Píer I  (rampa norte, contorna edificações)
      id: 2, source: 4, target: 2,
      waypoints: [
        { lat: -2.5641, lng: -44.3752 },
        { lat: -2.5630, lng: -44.3750 },
      ],
    },
    {
      // Acesso Píer I → Cais Píer I  (descida ao cais)
      id: 3, source: 2, target: 3,
      waypoints: [
        { lat: -2.5610, lng: -44.3740 },
      ],
    },
    {
      // Bifurcação Central → Acesso Píer III  (via sul, desvia do pátio central)
      id: 4, source: 4, target: 5,
      waypoints: [
        { lat: -2.5651, lng: -44.3742 },
        { lat: -2.5655, lng: -44.3730 },
      ],
    },
    {
      // Acesso Píer III → Cais Píer III
      id: 5, source: 5, target: 6,
      waypoints: [
        { lat: -2.5653, lng: -44.3707 },
      ],
    },
    {
      // Acesso Píer III → Acesso Píer IV  (trecho de ligação entre píeres)
      id: 6, source: 5, target: 7,
      waypoints: [
        { lat: -2.5663, lng: -44.3715 },
        { lat: -2.5668, lng: -44.3712 },
      ],
    },
    {
      // Acesso Píer IV → Cais Píer IV
      id: 7, source: 7, target: 8,
      waypoints: [
        { lat: -2.5670, lng: -44.3698 },
      ],
    },
    {
      // Cais Píer III → Pátio de Silos  (corredor de silos)
      id: 8, source: 6, target: 9,
      waypoints: [
        { lat: -2.5648, lng: -44.3678 },
        { lat: -2.5653, lng: -44.3668 },
      ],
    },
    {
      // Cais Píer IV → Pátio de Silos
      id: 9, source: 8, target: 9,
      waypoints: [
        { lat: -2.5665, lng: -44.3672 },
      ],
    },
    {
      // Pátio de Triagem → Acesso Píer III  (atalho interno, margeia pátio)
      id: 10, source: 1, target: 5,
      waypoints: [
        { lat: -2.5640, lng: -44.3765 },
        { lat: -2.5647, lng: -44.3748 },
        { lat: -2.5655, lng: -44.3733 },
      ],
    },
  ];

  /* ══════════════════════════════════════════════
     2. FUNÇÕES DE DISTÂNCIA
  ══════════════════════════════════════════════ */

  function haversine(a, b) {
    const R    = 6371000;
    const toRad = d => d * Math.PI / 180;
    const dLat  = toRad(b.lat - a.lat);
    const dLng  = toRad(b.lng - a.lng);
    const sinDLat = Math.sin(dLat / 2);
    const sinDLng = Math.sin(dLng / 2);
    const q = sinDLat * sinDLat +
              Math.cos(toRad(a.lat)) * Math.cos(toRad(b.lat)) * sinDLng * sinDLng;
    return R * 2 * Math.atan2(Math.sqrt(q), Math.sqrt(1 - q));
  }

  /**
   * Retorna a lista completa de pontos de uma aresta:
   * [source_node, ...waypoints, target_node]
   */
  function edgeAllPoints(e) {
    const src = nodes.find(n => n.id === e.source);
    const tgt = nodes.find(n => n.id === e.target);
    return [src, ...(e.waypoints || []), tgt];
  }

  /**
   * Comprimento total da aresta somando todos os segmentos intermediários.
   */
  function edgeLength(e) {
    const pts = edgeAllPoints(e);
    let dist = 0;
    for (let i = 0; i < pts.length - 1; i++) dist += haversine(pts[i], pts[i + 1]);
    return dist;
  }

  /* Pré-calcula o peso (distância real via waypoints) de cada aresta */
  edges.forEach(e => { e.weight = edgeLength(e); });

  /* ══════════════════════════════════════════════
     3. INTERDIÇÕES — "BOLAS PRETAS"
  ══════════════════════════════════════════════ */

  const BLOCK_RADIUS = 30; // metros

  /** Array global de { circle: L.Circle, lat, lng } */
  const blockCircles = [];

  /** Verifica se o ponto {lat, lng} está dentro do raio de algum bloqueio ativo. */
  function pointBlockedByCircle(pt) {
    return blockCircles.some(b => haversine(pt, b) <= BLOCK_RADIUS);
  }

  /** Verifica se algum ponto da aresta (incluindo waypoints) está bloqueado. */
  function edgeBlockedByCircles(e) {
    return edgeAllPoints(e).some(pt => pointBlockedByCircle(pt));
  }

  /* ══════════════════════════════════════════════
     4. MOTOR A*
  ══════════════════════════════════════════════ */

  function buildAdjacency() {
    const adj = {};
    nodes.forEach(n => { adj[n.id] = []; });
    edges.forEach(e => {
      // Aresta ignorada se explicitamente bloqueada OU interceptada por círculo
      if (e.isBlocked || edgeBlockedByCircles(e)) return;
      adj[e.source].push({ to: e.target, cost: e.weight });
      adj[e.target].push({ to: e.source, cost: e.weight }); // bidirecional
    });
    return adj;
  }

  function heuristic(nodeId, goalId) {
    const a = nodes.find(n => n.id === nodeId);
    const b = nodes.find(n => n.id === goalId);
    return haversine(a, b);
  }

  /** A* — retorna { path: [nodeId,...], totalDistance: meters } ou null */
  function aStar(startId, goalId) {
    if (startId === goalId) return { path: [startId], totalDistance: 0 };

    const adj      = buildAdjacency();
    const open     = [{ id: startId, f: 0 }];
    const gScore   = {};
    const cameFrom = {};

    nodes.forEach(n => { gScore[n.id] = Infinity; });
    gScore[startId] = 0;

    while (open.length > 0) {
      open.sort((a, b) => a.f - b.f);
      const { id: current } = open.shift();

      if (current === goalId) {
        const path = [];
        let cur = goalId;
        while (cur !== undefined) { path.unshift(cur); cur = cameFrom[cur]; }
        return { path, totalDistance: gScore[goalId] };
      }

      for (const { to, cost } of adj[current]) {
        const tentative = gScore[current] + cost;
        if (tentative < gScore[to]) {
          cameFrom[to] = current;
          gScore[to]   = tentative;
          const f      = tentative + heuristic(to, goalId);
          const existing = open.find(o => o.id === to);
          if (existing) existing.f = f;
          else open.push({ id: to, f });
        }
      }
    }
    return null;
  }

  /* ══════════════════════════════════════════════
     5. MAPA LEAFLET
  ══════════════════════════════════════════════ */

  const TMPM_CENTER = [-2.5640, -44.3750];

  const map = L.map('map', { center: TMPM_CENTER, zoom: 16, zoomControl: true });

  L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
    attribution: '&copy; OpenStreetMap &copy; CARTO',
    subdomains: 'abcd',
    maxZoom: 20,
  }).addTo(map);

  /* ── Marcadores de nós ── */
  nodes.forEach(node => {
    const icon = L.divIcon({
      className: '',
      html: `<div class="node-marker-inner"></div>`,
      iconSize: [10, 10],
      iconAnchor: [5, 5],
    });
    L.marker([node.lat, node.lng], { icon })
      .addTo(map)
      .bindTooltip(node.name, { permanent: false, direction: 'top', offset: [0, -8] });
  });

  /* ── Polylines das arestas (azuis) ── */
  const edgePolylines = {};

  function buildEdgeLatLngs(e) {
    return edgeAllPoints(e).map(p => [p.lat, p.lng]);
  }

  edges.forEach(e => {
    const line = L.polyline(buildEdgeLatLngs(e), {
      color: '#3388ff',
      weight: 6,
      opacity: 0.85,
    }).addTo(map);
    edgePolylines[e.id] = line;
  });

  /* ── Polyline da rota (verde) ── */
  let routeLayer = null;

  /**
   * Reconstrói a polyline verde seguindo os waypoints reais de cada aresta
   * percorrida, na ordem correta (considera bidirecionalidade).
   */
  function drawRoute(path) {
    if (routeLayer) { map.removeLayer(routeLayer); routeLayer = null; }
    if (!path || path.length < 2) return;

    const latlngs = [];

    for (let i = 0; i < path.length - 1; i++) {
      const fromId = path[i];
      const toId   = path[i + 1];

      const edge = edges.find(e =>
        (e.source === fromId && e.target === toId) ||
        (e.source === toId   && e.target === fromId)
      );

      if (!edge) continue;

      // Monta a sequência de pontos na direção correta do percurso
      let pts = edgeAllPoints(edge); // [source, ...waypoints, target]
      if (edge.source !== fromId) pts = pts.slice().reverse();

      // Evita duplicar o ponto de junção entre arestas consecutivas
      const start = latlngs.length === 0 ? 0 : 1;
      for (let j = start; j < pts.length; j++) {
        latlngs.push([pts[j].lat, pts[j].lng]);
      }
    }

    routeLayer = L.polyline(latlngs, {
      color: '#00ff9d',
      weight: 4,
      opacity: 1,
      interactive: false, // não bloqueia cliques no mapa abaixo
    }).addTo(map);
  }

  /* ── Atualiza cor das linhas azuis conforme estado de bloqueio ── */
  function refreshEdgeStyles() {
    edges.forEach(e => {
      const blocked = e.isBlocked || edgeBlockedByCircles(e);
      edgePolylines[e.id].setStyle({
        color:   blocked ? '#ff3d57' : '#3388ff',
        opacity: blocked ? 0.90      : 0.85,
      });
    });
  }

  /* ══════════════════════════════════════════════
     6. PAINEL — SELECTS
  ══════════════════════════════════════════════ */

  const selOrigin = document.getElementById('sel-origin');
  const selDest   = document.getElementById('sel-dest');
  const statusBar = document.getElementById('status-bar');

  nodes.forEach(n => {
    selOrigin.appendChild(new Option(n.name, n.id));
    selDest.appendChild(new Option(n.name, n.id));
  });

  selOrigin.value = 0;
  selDest.value   = 9;

  function runRouting() {
    refreshEdgeStyles();

    const startId = parseInt(selOrigin.value);
    const goalId  = parseInt(selDest.value);

    if (startId === goalId) {
      setStatus('SELECIONE NÓS DIFERENTES', 'err');
      drawRoute(null);
      return;
    }

    const result = aStar(startId, goalId);

    if (!result) {
      setStatus('ROTA INDISPONÍVEL', 'err');
      drawRoute(null);
      alert('Rota indisponível');
      return;
    }

    const { path, totalDistance } = result;
    // totalDistance estruturado para uso futuro na UI
    drawRoute(path);
    setStatus(`ROTA · ${path.length} NÓS · ${totalDistance.toFixed(0)} m`, 'ok');
  }

  function setStatus(msg, cls) {
    statusBar.textContent = msg;
    statusBar.className   = cls;
  }

  selOrigin.addEventListener('change', runRouting);
  selDest.addEventListener('change', runRouting);

  /* ══════════════════════════════════════════════
     7. INTERDIÇÃO DINÂMICA — BOLA PRETA
  ══════════════════════════════════════════════ */

  /**
   * Retorna o índice do círculo de bloqueio cujo centro está dentro de
   * BLOCK_RADIUS em relação ao ponto clicado; -1 se nenhum.
   */
  function findCircleAt(latlng) {
    return blockCircles.findIndex(b => haversine(latlng, b) <= BLOCK_RADIUS);
  }

  map.on('click', function (e) {
    const clicked = { lat: e.latlng.lat, lng: e.latlng.lng };
    const existing = findCircleAt(clicked);

    if (existing !== -1) {
      // Remove círculo existente (toggle)
      map.removeLayer(blockCircles[existing].circle);
      blockCircles.splice(existing, 1);
    } else {
      // Adiciona novo círculo de interdição
      const circle = L.circle([clicked.lat, clicked.lng], {
        radius:      BLOCK_RADIUS,
        color:       '#444',
        fillColor:   '#111',
        fillOpacity: 0.85,
        weight:      2,
        interactive: false,
      }).addTo(map);

      blockCircles.push({ lat: clicked.lat, lng: clicked.lng, circle });
    }

    runRouting(); // recalcula imediatamente
  });

  /* ── Botão "Limpar Bloqueios" ── */
  document.getElementById('btn-clear').addEventListener('click', () => {
    blockCircles.forEach(b => map.removeLayer(b.circle));
    blockCircles.length = 0;
    runRouting();
  });
