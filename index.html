<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TMPM — Roteamento Dinâmico</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Barlow+Condensed:wght@400;600;700&display=swap');

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0f14;
      --panel-bg: rgba(8, 16, 24, 0.92);
      --border: #1a3a52;
      --accent: #00c8ff;
      --accent2: #00ff9d;
      --danger: #ff3d57;
      --text: #cde8f5;
      --muted: #5a8099;
      --edge-free: #3388ff;
      --edge-blocked: #ff3d57;
      --route: #00ff9d;
      --mono: 'Share Tech Mono', monospace;
      --sans: 'Barlow Condensed', sans-serif;
    }

    html, body { height: 100%; width: 100%; overflow: hidden; background: var(--bg); }

    #map {
      position: absolute;
      inset: 0;
      z-index: 0;
      filter: saturate(0.7) brightness(0.85);
    }

    /* ── PANEL ── */
    #panel {
      position: absolute;
      top: 18px;
      left: 18px;
      z-index: 999;
      width: 290px;
      background: var(--panel-bg);
      border: 1px solid var(--border);
      border-radius: 4px;
      backdrop-filter: blur(12px);
      overflow: hidden;
      box-shadow: 0 8px 40px rgba(0,0,0,0.6), 0 0 0 1px rgba(0,200,255,0.08);
    }

    #panel-header {
      padding: 14px 16px 10px;
      border-bottom: 1px solid var(--border);
      background: rgba(0,200,255,0.04);
    }

    #panel-header .label {
      font-family: var(--mono);
      font-size: 10px;
      letter-spacing: 0.18em;
      color: var(--accent);
      text-transform: uppercase;
      margin-bottom: 2px;
    }

    #panel-header h1 {
      font-family: var(--sans);
      font-size: 18px;
      font-weight: 700;
      letter-spacing: 0.04em;
      color: var(--text);
      text-transform: uppercase;
    }

    #panel-body { padding: 14px 16px; display: flex; flex-direction: column; gap: 10px; }

    .field label {
      display: block;
      font-family: var(--mono);
      font-size: 10px;
      letter-spacing: 0.14em;
      color: var(--muted);
      text-transform: uppercase;
      margin-bottom: 5px;
    }

    .field select {
      width: 100%;
      background: rgba(0,200,255,0.05);
      border: 1px solid var(--border);
      border-radius: 3px;
      color: var(--text);
      font-family: var(--sans);
      font-size: 14px;
      font-weight: 600;
      letter-spacing: 0.03em;
      padding: 7px 10px;
      appearance: none;
      -webkit-appearance: none;
      cursor: pointer;
      transition: border-color 0.2s, background 0.2s;
      outline: none;
    }

    .field select:focus {
      border-color: var(--accent);
      background: rgba(0,200,255,0.09);
    }

    .field select option { background: #0d1e2e; color: var(--text); }

    #divider {
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--border), transparent);
      margin: 0 -16px;
    }

    #status-bar {
      font-family: var(--mono);
      font-size: 11px;
      color: var(--muted);
      letter-spacing: 0.06em;
      min-height: 18px;
      transition: color 0.3s;
      padding-top: 2px;
    }

    #status-bar.ok { color: var(--accent2); }
    #status-bar.err { color: var(--danger); }
    #status-bar.idle { color: var(--muted); }

    /* ── LEGEND ── */
    #legend {
      position: absolute;
      bottom: 28px;
      left: 18px;
      z-index: 999;
      background: var(--panel-bg);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 10px 14px;
      backdrop-filter: blur(10px);
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .leg-item {
      display: flex;
      align-items: center;
      gap: 8px;
      font-family: var(--mono);
      font-size: 10px;
      letter-spacing: 0.1em;
      color: var(--muted);
      text-transform: uppercase;
    }

    .leg-line {
      width: 28px;
      height: 3px;
      border-radius: 2px;
      flex-shrink: 0;
    }

    /* ── TOOLTIP OVERRIDE ── */
    .leaflet-tooltip {
      background: var(--panel-bg) !important;
      border: 1px solid var(--border) !important;
      color: var(--accent) !important;
      font-family: var(--mono) !important;
      font-size: 11px !important;
      letter-spacing: 0.1em !important;
      border-radius: 3px !important;
      box-shadow: 0 4px 16px rgba(0,0,0,0.5) !important;
      padding: 4px 8px !important;
      white-space: nowrap !important;
    }

    .leaflet-tooltip::before { display: none !important; }

    /* ── ATTRIBUTION ── */
    .leaflet-control-attribution { font-size: 9px; opacity: 0.4; }

    /* ── SCAN LINE OVERLAY ── */
    #overlay {
      position: absolute;
      inset: 0;
      z-index: 1;
      pointer-events: none;
      background: repeating-linear-gradient(
        0deg,
        transparent,
        transparent 2px,
        rgba(0, 200, 255, 0.012) 2px,
        rgba(0, 200, 255, 0.012) 4px
      );
    }

    /* ── PULSE NODE ── */
    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.6; transform: scale(1.3); }
    }

    .node-marker-inner {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: var(--accent);
      border: 2px solid rgba(0,200,255,0.5);
      box-shadow: 0 0 8px var(--accent);
      animation: pulse 2.6s ease-in-out infinite;
    }
  </style>
</head>
<body>
  <div id="map"></div>
  <div id="overlay"></div>

  <div id="panel">
    <div id="panel-header">
      <div class="label">Terminal Marítimo · TMPM</div>
      <h1>Roteamento A*</h1>
    </div>
    <div id="panel-body">
      <div class="field">
        <label>Partida</label>
        <select id="sel-origin"></select>
      </div>
      <div class="field">
        <label>Chegada</label>
        <select id="sel-dest"></select>
      </div>
      <div id="divider"></div>
      <div id="status-bar" class="idle">AGUARDANDO SELEÇÃO…</div>
    </div>
  </div>

  <div id="legend">
    <div class="leg-item"><div class="leg-line" style="background:#3388ff"></div>Via livre</div>
    <div class="leg-item"><div class="leg-line" style="background:#ff3d57"></div>Via bloqueada</div>
    <div class="leg-item"><div class="leg-line" style="background:#00ff9d"></div>Rota calculada</div>
  </div>

  <script>
  /* ══════════════════════════════════════════════
     1. GRAFO GEOGRÁFICO — TMPM, São Luís / MA
     Coordenadas mockadas dentro do perímetro do
     Terminal Marítimo de Ponta da Madeira
  ══════════════════════════════════════════════ */
  const nodes = [
    { id: 0, name: 'Portaria Principal',     lat: -2.5645, lng: -44.3785 },
    { id: 1, name: 'Pátio de Triagem',       lat: -2.5652, lng: -44.3762 },
    { id: 2, name: 'Cais Norte',             lat: -2.5630, lng: -44.3748 },
    { id: 3, name: 'Cais Sul',               lat: -2.5672, lng: -44.3745 },
    { id: 4, name: 'Área de Manutenção',     lat: -2.5660, lng: -44.3720 },
    { id: 5, name: 'Silo de Minério A',      lat: -2.5640, lng: -44.3700 },
    { id: 6, name: 'Silo de Minério B',      lat: -2.5665, lng: -44.3695 },
    { id: 7, name: 'Ponto de Embarque',      lat: -2.5648, lng: -44.3670 },
  ];

  const edges = [
    { id: 0, source: 0, target: 1, isBlocked: false },
    { id: 1, source: 1, target: 2, isBlocked: false },
    { id: 2, source: 1, target: 3, isBlocked: false },
    { id: 3, source: 2, target: 4, isBlocked: false },
    { id: 4, source: 3, target: 4, isBlocked: false },
    { id: 5, source: 4, target: 5, isBlocked: false },
    { id: 6, source: 4, target: 6, isBlocked: false },
    { id: 7, source: 5, target: 7, isBlocked: false },
    { id: 8, source: 6, target: 7, isBlocked: false },
    { id: 9, source: 2, target: 3, isBlocked: false },
    { id:10, source: 5, target: 6, isBlocked: false },
  ];

  /* ══════════════════════════════════════════════
     2. FUNÇÕES DE DISTÂNCIA
  ══════════════════════════════════════════════ */
  function haversine(a, b) {
    const R = 6371000; // raio da Terra em metros
    const toRad = d => d * Math.PI / 180;
    const dLat = toRad(b.lat - a.lat);
    const dLng = toRad(b.lng - a.lng);
    const sinDLat = Math.sin(dLat / 2);
    const sinDLng = Math.sin(dLng / 2);
    const q = sinDLat * sinDLat +
              Math.cos(toRad(a.lat)) * Math.cos(toRad(b.lat)) *
              sinDLng * sinDLng;
    return R * 2 * Math.atan2(Math.sqrt(q), Math.sqrt(1 - q));
  }

  /* Calcula peso (distância em metros) de cada aresta */
  edges.forEach(e => {
    const src = nodes.find(n => n.id === e.source);
    const tgt = nodes.find(n => n.id === e.target);
    e.weight = haversine(src, tgt);
  });

  /* ══════════════════════════════════════════════
     3. MOTOR A*
  ══════════════════════════════════════════════ */
  function buildAdjacency() {
    const adj = {};
    nodes.forEach(n => { adj[n.id] = []; });
    edges.forEach(e => {
      if (e.isBlocked) return;
      adj[e.source].push({ to: e.target, cost: e.weight });
      adj[e.target].push({ to: e.source, cost: e.weight }); // bidirecional
    });
    return adj;
  }

  function heuristic(nodeId, goalId) {
    const a = nodes.find(n => n.id === nodeId);
    const b = nodes.find(n => n.id === goalId);
    return haversine(a, b);
  }

  /**
   * A* — retorna { path: [nodeId,...], totalDistance: meters } ou null
   */
  function aStar(startId, goalId) {
    if (startId === goalId) return { path: [startId], totalDistance: 0 };

    const adj = buildAdjacency();

    // MinHeap simples via array ordenado
    const open = [{ id: startId, f: 0 }];
    const gScore = {};
    const cameFrom = {};

    nodes.forEach(n => { gScore[n.id] = Infinity; });
    gScore[startId] = 0;

    while (open.length > 0) {
      open.sort((a, b) => a.f - b.f);
      const { id: current } = open.shift();

      if (current === goalId) {
        // reconstruir caminho
        const path = [];
        let cur = goalId;
        while (cur !== undefined) {
          path.unshift(cur);
          cur = cameFrom[cur];
        }
        const totalDistance = gScore[goalId];
        return { path, totalDistance };
      }

      for (const { to, cost } of adj[current]) {
        const tentative = gScore[current] + cost;
        if (tentative < gScore[to]) {
          cameFrom[to] = current;
          gScore[to] = tentative;
          const f = tentative + heuristic(to, goalId);
          const existing = open.find(o => o.id === to);
          if (existing) existing.f = f;
          else open.push({ id: to, f });
        }
      }
    }
    return null; // sem rota
  }

  /* ══════════════════════════════════════════════
     4. MAPA LEAFLET
  ══════════════════════════════════════════════ */
  const TMPM_CENTER = [-2.5650, -44.3740];

  const map = L.map('map', {
    center: TMPM_CENTER,
    zoom: 16,
    zoomControl: true,
  });

  L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
    attribution: '&copy; OpenStreetMap &copy; CARTO',
    subdomains: 'abcd',
    maxZoom: 20,
  }).addTo(map);

  /* ── Marcadores de nós ── */
  nodes.forEach(node => {
    const icon = L.divIcon({
      className: '',
      html: `<div class="node-marker-inner"></div>`,
      iconSize: [10, 10],
      iconAnchor: [5, 5],
    });
    L.marker([node.lat, node.lng], { icon })
      .addTo(map)
      .bindTooltip(node.name, { permanent: false, direction: 'top', offset: [0, -8] });
  });

  /* ── Polylines das arestas ── */
  const edgePolylines = {};

  edges.forEach(e => {
    const src = nodes.find(n => n.id === e.source);
    const tgt = nodes.find(n => n.id === e.target);
    const line = L.polyline(
      [[src.lat, src.lng], [tgt.lat, tgt.lng]],
      { color: '#3388ff', weight: 6, opacity: 0.85 }
    ).addTo(map);

    line.on('click', () => onEdgeClick(e.id));
    edgePolylines[e.id] = line;
  });

  /* ── Polyline da rota ── */
  let routeLayer = null;

  function drawRoute(path) {
    if (routeLayer) { map.removeLayer(routeLayer); routeLayer = null; }
    if (!path || path.length < 2) return;
    const latlngs = path.map(id => {
      const n = nodes.find(n => n.id === id);
      return [n.lat, n.lng];
    });
    routeLayer = L.polyline(latlngs, {
      color: '#00ff9d',
      weight: 4,
      opacity: 1,
      interactive: false,   // não bloqueia cliques nas linhas azuis
    }).addTo(map);
  }

  /* ══════════════════════════════════════════════
     5. PAINEL — SELECTS
  ══════════════════════════════════════════════ */
  const selOrigin = document.getElementById('sel-origin');
  const selDest   = document.getElementById('sel-dest');
  const statusBar = document.getElementById('status-bar');

  nodes.forEach(n => {
    const o1 = new Option(n.name, n.id);
    const o2 = new Option(n.name, n.id);
    selOrigin.appendChild(o1);
    selDest.appendChild(o2);
  });

  // Padrão: origem = 0, destino = 7
  selOrigin.value = 0;
  selDest.value   = 7;

  function runRouting() {
    const startId = parseInt(selOrigin.value);
    const goalId  = parseInt(selDest.value);

    if (startId === goalId) {
      setStatus('SELECIONE NÓS DIFERENTES', 'err');
      drawRoute(null);
      return;
    }

    const result = aStar(startId, goalId);

    if (!result) {
      setStatus('ROTA INDISPONÍVEL', 'err');
      drawRoute(null);
      alert('Rota indisponível');
      return;
    }

    const { path, totalDistance } = result;
    // totalDistance está calculado e estruturado — pronto para uso futuro na UI
    // console.log(`Distância total: ${totalDistance.toFixed(0)} m`);

    drawRoute(path);
    setStatus(`ROTA · ${path.length} NÓS · ${totalDistance.toFixed(0)} m`, 'ok');
  }

  function setStatus(msg, cls) {
    statusBar.textContent = msg;
    statusBar.className = cls;
  }

  selOrigin.addEventListener('change', runRouting);
  selDest.addEventListener('change', runRouting);

  /* ══════════════════════════════════════════════
     6. BLOQUEIO DINÂMICO DE ARESTAS
  ══════════════════════════════════════════════ */
  function onEdgeClick(edgeId) {
    const edge = edges.find(e => e.id === edgeId);
    const line = edgePolylines[edgeId];
    if (!edge || !line) return;

    edge.isBlocked = !edge.isBlocked;
    line.setStyle({
      color: edge.isBlocked ? '#ff3d57' : '#3388ff',
      opacity: edge.isBlocked ? 0.9 : 0.85,
    });

    runRouting();
  }

  /* ══════════════════════════════════════════════
     7. INICIALIZAÇÃO
  ══════════════════════════════════════════════ */
  runRouting();
  </script>
</body>
</html>
